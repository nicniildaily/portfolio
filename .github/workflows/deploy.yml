name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ] # Runs every time you push to main

permissions:
  contents: write # Essential for the action to push to the gh-pages branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. Checkout your code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Setup the Flutter environment
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          # flutter-version: '3.x' # Optional: lock to a specific version

      # 3. Get dependencies and build the web app
      - name: Build Web
        run: |
          flutter pub get
          flutter 
          build web --release --base-href "/"

      # 4. Deploy to the gh-pages branch
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web

